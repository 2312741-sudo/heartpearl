name: Build iOS IPA for Sideloading

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔧 Prepare App Configuration
        run: |
          echo "Building with iOS and Android widgets enabled."

      - name: 🚀 Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: 🍎 Build iOS App (Unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          # Fix Node path for Xcode (Requires sudo)
          sudo ln -s $(which node) /usr/local/bin/node || true
          
          # Tắt yêu cầu code signing để build được không cần chứng chỉ
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO > build.log 2>&1

      - name: 📄 Print Build Log on Failure
        if: failure()
        run: |
          if [ -f ios/build.log ]; then
            echo "=== LAST 200 LINES OF BUILD LOG ==="
            tail -n 200 ios/build.log
          else
            echo "No build.log file found."
          fi

      - name: 💾 Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/build.log

      - name: 📦 Package IPA
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          # Tìm file .app và di chuyển vào Payload
          APP_NAME=$(ls -d *.app | head -n 1)
          mv "$APP_NAME" Payload/
          # Nén thành file ipa
          zip -r app-sideload.ipa Payload

      - name: 💾 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-sideload-ipa
          path: ios/build/Build/Products/Release-iphoneos/app-sideload.ipa
          retention-days: 7
